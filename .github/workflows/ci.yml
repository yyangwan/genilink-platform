name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: genilink
          POSTGRES_PASSWORD: genilink_dev
          POSTGRES_DB: genilink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npx vitest run
        env:
          DATABASE_URL: postgresql://genilink:genilink_dev@localhost:5432/genilink
          AUTH_SECRET: test-secret

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run build
        env:
          DATABASE_URL: postgresql://genilink:genilink_dev@localhost:5432/genilink
          AUTH_SECRET: test-secret
