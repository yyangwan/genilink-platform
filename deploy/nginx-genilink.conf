# Nginx configuration for GeniLink Platform
# Domain: genilink.cn
#
# Place this file in: /etc/nginx/sites-available/genilink.conf
# Enable with: ln -s /etc/nginx/sites-available/genilink.conf /etc/nginx/sites-enabled/

# Upstream for frontend service
upstream genilink_frontend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Upstream for content service (internal API)
upstream genilink_content {
    server 127.0.0.1:4002;
    keepalive 64;
}

# Upstream for visibility service (remote/external)
upstream genilink_visibility {
    server 127.0.0.1:5000;  # If running locally, or use external URL
    keepalive 64;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name genilink.cn www.genilink.cn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server - main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name genilink.cn www.genilink.cn;

    # SSL certificate configuration (use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/genilink.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genilink.cn/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client upload size limit
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/genilink-access.log;
    error_log /var/log/nginx/genilink-error.log;

    # Next.js static files (/_next/static/)
    location /_next/static/ {
        proxy_pass http://genilink_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js static images
    location /static/ {
        proxy_pass http://genilink_frontend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public";
    }

    # JWKS endpoint (public key for JWT verification)
    location /.well-known/jwks.json {
        proxy_pass http://genilink_frontend;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600";
    }

    # Content API routes (proxy to ContentOS service)
    location /api/content/ {
        proxy_pass http://genilink_content;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeout settings for API requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable caching for API
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Visibility API routes (proxy to visibility service)
    location /visibility/ {
        # Proxy to remote visibility service or local
        proxy_pass https://genilink.cn/visibility/;
        # Or if running locally:
        # proxy_pass http://genilink_visibility/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for streaming responses
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Auth API routes (NextAuth)
    location /api/auth/ {
        proxy_pass http://genilink_frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # NextAuth needs no caching
        add_header Cache-Control "no-cache, no-store";
    }

    # All other API routes
    location /api/ {
        proxy_pass http://genilink_frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://genilink_frontend;
        access_log off;
    }

    # All other requests (Next.js pages, assets, etc.)
    location / {
        proxy_pass http://genilink_frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
